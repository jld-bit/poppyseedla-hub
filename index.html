<!DOCTYPE html>
<html>
<head>
    <title>PoppyseedLA | Developer & Reseller</title>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-top: 2rem; color: #0f172a; letter-spacing: -1px; }
        .grid {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            padding: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 320px;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
        }
        /* Your Logo Styling */
        .brand-logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 4px solid #f1f5f9;
        }
        .vault-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        h2 { color: #0f172a; margin-bottom: 15px; }
        p { line-height: 1.6; color: #64748b; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            margin-top: auto;
            padding: 12px 25px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #334155;
        }
    </style>
</head>
<body>

    <h1>PoppyseedLA</h1>
    <p style="font-size: 1.2rem;">Building Apps & Sourcing Grails</p>

    <div class="grid">
        <div class="card">
            <img src="PoppyseedLA24.png" alt="PoppyseedLA Logo" class="brand-logo">
            <h2>The Dev Lab</h2>
            <p>Showcasing PiggyPal, Timeru, and modern mobile solutions built with React Native & Expo.</p>
            <a href="#" class="btn">Explore Apps</a>
        </div>

        <div class="card">
            <div class="vault-icon">👟</div>
            <h2>The Vault</h2>
            <p>Exclusive sneakers and vintage headwear. Sourcing the hard-to-find grails since 2024.</p>
            <a href="#" class="btn">Shop Collection</a>
        </div>
    </div>

</body>
</html>
